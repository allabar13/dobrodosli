<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EAF6FA">
<title>Добродошли! — сербский для жизни на Балканах</title>
<!-- шрифт вшит локально (css/fonts/) — без сети и без Google, стартует мгновенно -->
<link rel="stylesheet" href="css/fonts.css?v=3">
<link rel="stylesheet" href="css/styles.css?v=3">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Добродошли">
<link rel="icon" href="icons/icon-192.png" type="image/png">
</head>
<body class="bare">

<div id="app">
  <header id="topbar"></header>
  <main id="screen"></main>
  <nav id="tabbar"></nav>
</div>

<!-- полноэкранный слой урока -->
<div id="lesson" class="hidden">
  <div id="lesson-top">
    <button id="lesson-quit" title="Выйти из урока">✕</button>
    <div class="lp-bar"><i class="lp-fill"></i></div>
  </div>
  <div id="lesson-main"><div id="ex-area"></div></div>
  <div id="lesson-bottom">
    <div id="lesson-fb" class="lesson-fb"></div>
    <button id="btn-check" class="btn primary big" disabled>Проверить</button>
  </div>
</div>

<div id="toasts"></div>

<script src="js/config.js?v=3"></script>
<script src="js/analytics.js?v=3"></script>
<script src="js/translit.js?v=3"></script>
<script src="js/i18n.js?v=3"></script>
<script src="js/data.js?v=3"></script>
<script src="js/i18n-en.js?v=3"></script>
<script src="js/audio.js?v=3"></script>
<script src="js/state.js?v=3"></script>
<script src="js/cloud.js?v=3"></script>
<script src="js/exercises.js?v=3"></script>
<script src="js/app.js?v=3"></script>
<script>
// офлайн-режим (PWA); из локального файла не регистрируется
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
